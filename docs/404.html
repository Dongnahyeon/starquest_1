<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>StarQuest</title>
  <script>
    // GitHub Pages 라우팅 수정
    // 모든 404를 index.html로 리다이렉트
    var pathSegmentsToKeep = 1; // starquest 부분만 유지
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/')
        .replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
