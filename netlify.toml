[build]
command = "mkdir -p dist/web && echo '<!DOCTYPE html><html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width\"><title>StarQuest</title><style>body{font-family:system-ui;background:#0a0e1a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}.container{text-align:center;padding:20px}h1{font-size:2.5em;color:#f5c842;margin:0}p{font-size:1.2em;color:#718096;margin:10px 0}.button{padding:15px 40px;background:#f5c842;color:#0a0e1a;border:none;border-radius:50px;font-size:1.1em;font-weight:600;cursor:pointer}.info{margin-top:40px;padding:20px;background:#111827;border-radius:10px}</style></head><body><div class=\"container\"><h1>✨ StarQuest</h1><p>별자리 성취 관리</p><p>앱이 준비 중입니다.</p><button class=\"button\" onclick=\"location.reload()\">새로고침</button><div class=\"info\"><p>💡 iPhone Expo Go 앱에서 QR 코드를 스캔하여 사용하세요.</p><p>또는 Safari 홈화면에 추가하여 앱처럼 사용할 수 있습니다.</p></div></div></body></html>' > dist/web/index.html"
publish = "dist/web"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
