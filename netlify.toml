[build]
command = "pnpm build"
publish = "dist/web"
functions = "dist"

[build.environment]
NODE_VERSION = "20"
NODE_ENV = "production"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/index:path"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[context.production]
environment = { NODE_ENV = "production" }
