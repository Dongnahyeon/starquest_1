services:
  - type: web
    name: starquest-server
    env: node
    plan: free
    buildCommand: npm install && npx esbuild web-server-standalone.ts --platform=node --bundle --format=esm --outdir=dist-web
    startCommand: node dist-web/web-server-standalone.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
