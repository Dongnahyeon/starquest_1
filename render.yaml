services:
  - type: web
    name: starquest-server
    env: node
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build:web && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
